apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-gui
  namespace: gitlab
spec:
  ingressClassName: traefik
  rules:
  - host: gitlab-gui.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gitlab-webservice-default
            port:
              number: 8181